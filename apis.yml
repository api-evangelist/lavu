aid: lavu
name: Lavu
description: >-
  Lavu is a cloud-based iPad restaurant point-of-sale system, now positioned as
  an AI-powered restaurant intelligence platform, serving restaurants, bars, and
  hospitality businesses with POS, payments, inventory, and reporting. Lavu
  promotes an open API that lets developers and restaurants extend the point of
  sale, build peripheral components, and create tailored integrations without
  waiting on vendor roadmaps. The API is a POST-based REST-style interface
  exposing tables such as menu_groups, menu_categories, menu_items, tables,
  orders, order_contents, order_payments, ingredients, and ingredient_usage.
  Authentication uses dataname, key, and token credentials retrieved from the
  API tab of the POSLavu Control Panel. The developer documentation is gated
  behind the control panel and is not publicly published; API access comes with
  account service.
