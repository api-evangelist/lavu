aid: lavu
name: Lavu
description: >-
  Lavu is a cloud-based iPad restaurant point-of-sale system, now positioned as
  an AI-powered restaurant intelligence platform, serving restaurants, bars, and
  hospitality businesses with POS, payments, inventory, and reporting. Lavu
  promotes an open API that lets developers and restaurants extend the point of
  sale, build peripheral components, and create tailored integrations without
  waiting on vendor roadmaps. The POSLavu API is a POST-based interface where a
  single request server accepts form-encoded credentials (dataname, key, token)
  plus a table selector and returns XML rows; documented tables include
  menu_groups, menu_categories, menu_items, tables, orders, order_contents,
  order_payments, ingredients, and ingredient_usage. Records can be written with
  cmd=insert and an XML contents payload. Credentials are retrieved from the API
  tab of the POSLavu Control Panel, and the developer documentation is published
  at admin.poslavu.com; API access comes with an active Lavu account.
