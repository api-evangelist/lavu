apis:
  - aid: lavu:rest-api
    name: Lavu (POSLavu) API
    description: >-
      A POST-based data API for the Lavu restaurant POS. A single request server
      accepts form-encoded dataname, key, token, and table parameters and returns
      XML rows; reads support column/value exact-match filters, value_min/value_max
      range filters, and limit (offset,count) pagination, while cmd=insert writes
      XML row payloads. Documented tables include menu_groups, menu_categories,
      menu_items, tables, orders, order_contents, order_payments, ingredients, and
      ingredient_usage. Credentials come from the API tab of the POSLavu Control
      Panel.
    tags:
      - Point of Sale
      - Orders
      - Menu
      - Inventory
    properties:
      - type: Documentation
        url: https://admin.poslavu.com/cp/areas/api_doc.html
      - type: Documentation
        url: https://lavu.com/integrations/
      - type: OpenAPI
        url: openapi/lavu-poslavu-api.yml
      - type: NaftikoCapability
        url: capabilities/poslavu-api-menu.yaml
      - type: NaftikoCapability
        url: capabilities/poslavu-api-tables.yaml
      - type: NaftikoCapability
        url: capabilities/poslavu-api-orders.yaml
      - type: NaftikoCapability
        url: capabilities/poslavu-api-inventory.yaml
