x-common:
  features:
    - name: Open API
      description: >-
        POST-based table query and insert API for extending the POS and building
        peripheral components and integrations.
    - name: Menu Management
      description: >-
        Read menu groups, categories, and items, and insert new menu items.
    - name: Order Management
      description: >-
        Read orders, line items, and payments, and insert new orders, order
        contents, and payments.
    - name: Floor Layout
      description: >-
        Read the restaurant floor table layout (coordinates, shapes, names).
    - name: Inventory
      description: >-
        Read ingredients and ingredient usage data.
    - name: Payment Processing
      description: >-
        Integrated card payment processing with dual-pricing / cash-discount
        options to offset card fees.
  useCases:
    - name: Sales Reporting and Reconciliation
      description: >-
        Pull orders, order_contents, and order_payments to reconcile sales and
        payment volume against the POS and accounting systems.
    - name: Custom Online Ordering
      description: >-
        Read menu structure and insert orders to power a custom or third-party
        online ordering experience on top of Lavu.
    - name: Inventory and Recipe Costing
      description: >-
        Read ingredients and ingredient_usage to feed inventory tracking and
        recipe-costing tools.
    - name: Peripheral Integrations
      description: >-
        Build tailored integrations and peripheral components against the open
        POSLavu API without waiting on vendor roadmaps.
  integrations:
    - name: QuickBooks
      description: Accounting integration.
    - name: Xero
      description: Accounting integration.
    - name: Restaurant365
      description: Restaurant accounting and operations integration.
    - name: DoorDash
      description: Online ordering and delivery integration.
    - name: Grubhub
      description: Online ordering and delivery integration.
    - name: Uber Eats
      description: Online ordering and delivery integration.
    - name: Otter
      description: Online ordering aggregation integration.
    - name: Chowly
      description: Online ordering aggregation integration.
    - name: OpenTable
      description: Reservations and loyalty integration.
    - name: Marketman
      description: Inventory management integration.
